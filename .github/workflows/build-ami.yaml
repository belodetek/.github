---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@0b960d0b224ec97e02a95ad26b4709bdf90b95bf # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
