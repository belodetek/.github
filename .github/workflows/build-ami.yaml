---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@f3f3bb49b4231b6f51b7e052ff8d7744ea392081 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
