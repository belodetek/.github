---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@6612a71041be911b8d5057273832464278b291fe # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
