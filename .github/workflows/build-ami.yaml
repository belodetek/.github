---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@3597234b9a4331bf0d60396fa14edf187116b778 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
