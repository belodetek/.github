---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@b91dfe818470a47188377cf21e05b39bf8c6d190 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
