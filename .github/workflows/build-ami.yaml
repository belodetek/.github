---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@9f0a480f888f844fd93f9dc1772ac6fec426ea78 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
