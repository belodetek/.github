---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@04b4b5174f1b27c4655e84113f475b8aeb988986 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
