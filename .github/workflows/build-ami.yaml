---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@bbf1ab0a28ec9bee9175909b94375482f7c2687e # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
