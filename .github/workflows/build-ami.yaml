---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@b55bbd63d854cd194c7bdb507e0e1b7b851aab89 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
