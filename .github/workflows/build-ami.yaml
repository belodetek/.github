---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@0de57028ab787eada4076b2dc65c12c4bcd668de # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
