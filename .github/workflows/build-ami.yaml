---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@ea175c8bb1b9f013243241885f79351b41b9ae99 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
