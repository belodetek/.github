---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@28e0b9aac4d921c2cc5023690d472efb486c1598 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
