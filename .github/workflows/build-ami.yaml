---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@507acc800a53b224b892cc038f01dd073458a3e0 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
