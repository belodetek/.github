---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@6caf1857bad65b279b4e3076f5e5fae4528be19a # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
