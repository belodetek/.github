---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@987a9b5d4adf8eb57c782c047c85fd9b19fef4cd # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
