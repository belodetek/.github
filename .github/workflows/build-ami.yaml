---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@f25dfb1e83aab99c81566dbd6d0fef48f03ac4f9 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
