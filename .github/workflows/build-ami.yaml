---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@74ce9d4776bcd21b11dedfdb8957be71af76b511 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
