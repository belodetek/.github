---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@125332b9c2ceaa94c9bb6f74580de1cf326e58b4 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
