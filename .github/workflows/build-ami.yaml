---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@88a73cb98eeb8de8bd1fc64b908066fad6c9a784 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
