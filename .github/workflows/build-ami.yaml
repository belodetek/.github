---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@62dd9a6eb17f36629364ba16ffa92f67d5e2179a # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
