---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@5201e7ba837673d2597a3ee3028e7a5181d75d58 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
