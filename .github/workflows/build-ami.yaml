---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@3a602ce19acd6c6e5faaaedc7a581f7e279731c1 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
