---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@fdf52d164d14750538da18e787aa4883bf30e644 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
