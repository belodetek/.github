---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@ede788fa345c40a9df7de679a9b69e4a117a6073 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
