---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@8109aad1917af8db5beb5a11b874d85dd674c356 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
