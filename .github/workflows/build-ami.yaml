---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@691dcda510d4dd35dedf788815651e5491127a12 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
