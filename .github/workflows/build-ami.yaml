---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@06e64c8d3cdcc50356cbb3ea6a0655dc1a1f70c2 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
