---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@8bf2b054720edd2b28dbb715145ff642ccd921fb # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
