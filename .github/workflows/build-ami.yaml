---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@b4181de3505d189877e68fc7b1c71e8aff2dfb9c # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
