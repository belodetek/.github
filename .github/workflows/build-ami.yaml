---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@0c2db20d368eeb7d0785fa9b59a2146086262b9a # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
