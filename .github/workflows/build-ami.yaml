---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@9b3d9840398960e619f774d1bd36b57193721aa4 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
