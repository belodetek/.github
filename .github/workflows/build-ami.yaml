---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@edd94ee81646c66e84b7f14f7fa23164edc590f3 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
