---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@b943b179ef217835423247e1e61d8ea1dfa8df29 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
