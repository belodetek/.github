---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@2df4585b0eaa29570a74176ef24497abb1e3b638 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
