---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@be9d00892cbc6099d682eaa3d6a0e814141f019e # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
