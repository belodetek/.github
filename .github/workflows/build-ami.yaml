---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@9860493a7c9ac7e452472142f862dfe6cea58f14 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
