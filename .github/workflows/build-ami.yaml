---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@3b8546f41503d5a155dedf5dc793a7d3cd6c22ee # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
