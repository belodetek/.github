---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@bf396341eb4b9901a0b11dba7d3a18c085304b90 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
