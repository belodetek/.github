---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@11f5749894b6fc1d5ce1f56333a1f1ab3a0ce080 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
