---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@8ebd7b0126faca8c701a8fd309d6f38f3aaea29b # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
