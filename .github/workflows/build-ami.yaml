---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@070a296ce827dfab332ea41ed49146faa46cba2a # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
