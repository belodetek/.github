---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@ed85e948b4e42f4ca0f66884f456dd84a4c319af # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
