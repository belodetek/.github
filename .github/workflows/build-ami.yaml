---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@f2cfe86d4c029ede3d86b353eda5072a547938f1 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
