---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@79d1d5c3d98a4011ebd89e5d75fe8b79edcd9be9 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
