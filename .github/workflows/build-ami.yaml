---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@2209d2ec4c67ff7bb12f4c24278b9dc25e1643b4 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
