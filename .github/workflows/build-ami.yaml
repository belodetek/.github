---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@77c6c87d27428e0a9b35caa68bbd85f69367c9b3 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
