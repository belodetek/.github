---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@616d58ca43d5371401e690986bc28c2b32c9233d # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
