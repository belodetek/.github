---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@4ef2cfbb8a6e8ae626b7a6e0f1e163b0dc3c2a3e # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
