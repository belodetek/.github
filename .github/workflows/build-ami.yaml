---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@4928109a78fd213a0cff7431dd949170b9265bc8 # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
