---
name: Build and register (manually) balenaOS AWS/EC2 AMI
on:
  workflow_dispatch:
    inputs:
      balena_os_version:
        required: false
        type: string

jobs:
  dispatch-import-vm:
    name: call-import-vm
    uses: belodetek/.github/.github/workflows/vmimport.yaml@61cb7bc5e6fb7a0df3d8612fb1814d4d25f4041f # master
    secrets: inherit
    with:
      balena_os_version: ${{ inputs.balena_os_version }}
